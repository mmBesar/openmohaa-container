# Give the GITHUB_TOKEN permission to push packages
permissions:
  contents: read
  packages: write

name: Build, Push & Manifest Multi-Arch Image

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/image-build.yml'
      - 'Dockerfile'
      - 'UPSTREAM_VERSION'
  pull_request:
    paths:
      - '.github/workflows/image-build.yml'
      - 'Dockerfile'
      - 'UPSTREAM_VERSION'
  workflow_dispatch:

jobs:
  # 1) Build & push per-arch
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64, riscv64]

    outputs:
      image_name: ${{ steps.lowercase.outputs.image_name }}
      upstream_version: ${{ steps.version.outputs.upstream_version }}

    steps:
      - name: Checkout main for Dockerfile
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout upstream for source
        uses: actions/checkout@v4
        with:
          ref: upstream
          path: upstream

      - name: Read upstream version
        id: version
        run: |
          VERSION=$(cat main/UPSTREAM_VERSION 2>/dev/null || echo "unknown")
          echo "upstream_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Register QEMU for emulation
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: lowercase
        run: |
          IMAGE=$(echo $GITHUB_REPOSITORY | tr '[:upper:]' '[:lower:]')
          echo "image_name=$IMAGE" >> $GITHUB_OUTPUT

      - name: Build & push ${{ matrix.arch }}
        uses: docker/build-push-action@v5
        with:
          context: ./upstream
          file: ./main/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ steps.lowercase.outputs.image_name }}:latest-${{ matrix.arch }}
            ghcr.io/${{ steps.lowercase.outputs.image_name }}:${{ steps.version.outputs.upstream_version }}-${{ matrix.arch }}
          cache-from: type=registry,ref=ghcr.io/${{ steps.lowercase.outputs.image_name }}:cache-${{ matrix.arch }}
          cache-to:   type=registry,ref=ghcr.io/${{ steps.lowercase.outputs.image_name }}:cache-${{ matrix.arch }},mode=max

  # 2) Assemble the multi-arch manifest
  manifest:
    needs: build
    runs-on: ubuntu-latest
    # Only run manifest on real pushes, not PRs
    if: github.event_name != 'pull_request'

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest (latest)
        run: |
          IMAGE=${{ needs.build.outputs.image_name }}
          docker buildx imagetools create \
            --tag ghcr.io/$IMAGE:latest \
            ghcr.io/$IMAGE:latest-amd64 \
            ghcr.io/$IMAGE:latest-arm64 \
            ghcr.io/$IMAGE:latest-riscv64

      - name: Create multi-arch manifest (version)
        run: |
          IMAGE=${{ needs.build.outputs.image_name }}
          VERSION=${{ needs.build.outputs.upstream_version }}
          docker buildx imagetools create \
            --tag ghcr.io/$IMAGE:$VERSION \
            ghcr.io/$IMAGE:$VERSION-amd64 \
            ghcr.io/$IMAGE:$VERSION-arm64 \
            ghcr.io/$IMAGE:$VERSION-riscv64
